<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إحصاء بيانات طالبات التحصين - شمال الباطنة</title>
    <style>
        /* ... (保持之前的所有样式不变) ... */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; border-radius: 24px; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1); padding: 30px 40px; max-width: 1000px; width: 100%; transition: all 0.2s; }
        h1 { font-size: 26px; color: #1e293b; margin-bottom: 6px; text-align: center; font-weight: 700; }
        .subtitle { text-align: center; color: #64748b; font-size: 16px; margin-bottom: 12px; border-bottom: 2px solid #e9edf2; padding-bottom: 18px; }
        .status-box { background: #f1f5f9; padding: 12px 18px; border-radius: 40px; text-align: center; font-size: 15px; color: #1e293b; margin-bottom: 20px; border: 1px solid #e2e8f0; display: flex; justify-content: center; align-items: center; gap: 12px; flex-wrap: wrap; }
        .status-box .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin-bottom: 30px; }
        .stat-card { background: #f8fafc; border-radius: 16px; padding: 18px 12px 14px; text-align: center; border: 1px solid #e2e8f0; transition: 0.15s; }
        .stat-card:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .stat-city { font-size: 17px; font-weight: 600; color: #0f172a; margin-bottom: 6px; }
        .stat-number { font-size: 32px; font-weight: 700; color: #2563eb; line-height: 1.2; }
        .stat-label { font-size: 13px; color: #64748b; margin-top: 4px; }
        .table-wrapper { overflow-x: auto; border-radius: 14px; border: 1px solid #e2e8f0; background: #fafcff; margin-top: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: center; min-width: 480px; }
        th { background: #f1f5f9; color: #1e293b; font-weight: 600; padding: 14px 10px; border-bottom: 2px solid #d1d9e6; font-size: 15px; }
        td { padding: 11px 10px; border-bottom: 1px solid #e9edf2; color: #1e293b; }
        tr:last-child td { border-bottom: none; }
        .highlight-row { background: #f8fafc; }
        .footer-note { margin-top: 24px; font-size: 14px; color: #64748b; text-align: center; background: #f8fafc; padding: 12px 16px; border-radius: 40px; border: 1px solid #e9edf2; }
        .footer-note strong { color: #0f172a; }
        .info-badge { background: #dbeafe; border-radius: 30px; padding: 4px 14px; font-size: 13px; color: #1e40af; display: inline-block; margin-right: 12px; }
        .error-placeholder { padding: 30px; text-align: center; color: #dc2626; background: #fef2f2; border-radius: 16px; border: 1px solid #fecaca; }
        @media (max-width: 600px) { .container { padding: 20px 16px; } h1 { font-size: 21px; } .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; } .stat-card { padding: 12px 6px; } .stat-number { font-size: 26px; } .stat-city { font-size: 15px; } .status-box { font-size: 13px; padding: 10px 14px; } }
        @media (max-width: 420px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 إحصاء بيانات طالبات التحصين</h1>
    <div class="subtitle">ولايات شمال الباطنة · عدد الأرقام المسجلة في كل عمود</div>

    <!-- حالة التحميل -->
    <div class="status-box" id="statusBox">
        <span class="spinner" id="loaderSpinner" style="display:none;"></span>
        <span id="statusText">⏳ جاري تحميل البيانات...</span>
    </div>

    <!-- بطاقات الإحصاء -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- الجدول التفصيلي -->
    <div class="table-wrapper">
        <table>
            <thead><tr><th>#</th><th>الولاية</th><th>عدد البيانات</th><th>حالة العمود</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="footer-note">
        <strong>إجمالي البيانات:</strong> <span id="totalCount">0</span> رقم ·
        <strong>المدن:</strong> <span id="cityCount">0</span>
        <span class="info-badge" id="dataSourceBadge">🌐 مباشر</span>
    </div>
</div>

<script>
    (function() {
        // --- 配置区 ---
        // ⚠️ 重要：请将此URL替换为你从“发布到网络”功能获取的CSV链接
        const CSV_URL = 'YOUR_PUBLISHED_CSV_URL';
        // 自动刷新间隔（毫秒），例如 60000 为1分钟
        const REFRESH_INTERVAL = 60000; 

        // --- DOM 元素 ---
        const statusText = document.getElementById('statusText');
        const loaderSpinner = document.getElementById('loaderSpinner');
        const statsGrid = document.getElementById('statsGrid');
        const tableBody = document.getElementById('tableBody');
        const totalSpan = document.getElementById('totalCount');
        const citySpan = document.getElementById('cityCount');
        const badge = document.getElementById('dataSourceBadge');

        // --- 核心函数：解析CSV并渲染 ---
        function parseAndRender(csvText) {
            const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== '');
            if (lines.length === 0) throw new Error('الملف فارغ أو لا يحتوي على بيانات.');

            const headers = lines[0].split(',').map(h => h.trim());
            const rows = [];
            for (let i = 1; i < lines.length; i++) {
                const cells = lines[i].split(',');
                const row = headers.map((_, j) => (j < cells.length ? cells[j].trim() : ''));
                rows.push(row);
            }

            // 计算每列非空数量
            const counts = headers.map(() => 0);
            for (const row of rows) {
                for (let j = 0; j < row.length && j < headers.length; j++) {
                    if (row[j] !== '' && row[j] !== null && row[j] !== undefined) {
                        counts[j]++;
                    }
                }
            }

            // --- 渲染 ---
            // 1. 卡片
            statsGrid.innerHTML = '';
            headers.forEach((city, idx) => {
                const card = document.createElement('div');
                card.className = 'stat-card';
                card.innerHTML = `
                    <div class="stat-city">${city}</div>
                    <div class="stat-number">${counts[idx]}</div>
                    <div class="stat-label">رقم مسجل</div>
                `;
                statsGrid.appendChild(card);
            });

            // 2. 表格
            tableBody.innerHTML = '';
            let total = 0;
            headers.forEach((city, idx) => {
                total += counts[idx];
                const tr = document.createElement('tr');
                if (idx % 2 === 0) tr.classList.add('highlight-row');
                const status = counts[idx] > 0 ? '✅ نشط' : '⚪ فارغ';
                tr.innerHTML = `
                    <td>${idx + 1}</td>
                    <td><strong>${city}</strong></td>
                    <td>${counts[idx]}</td>
                    <td>${status}</td>
                `;
                tableBody.appendChild(tr);
            });

            // 3. 摘要
            totalSpan.textContent = total;
            citySpan.textContent = headers.length;
            badge.textContent = '🌐 مباشر';
        }

        // --- 从Google Sheets获取数据 ---
        async function fetchData() {
            statusText.innerHTML = '⏳ جاري تحديث البيانات...';
            loaderSpinner.style.display = 'inline-block';

            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error(`فشل الاتصال (${response.status})`);
                const csvText = await response.text();

                // 简单校验
                if (csvText.includes('<html') || !csvText.includes(',')) {
                    throw new Error('البيانات المسترجعة ليست بصيغة CSV صالحة.');
                }

                parseAndRender(csvText);
                statusText.innerHTML = '✅ تم تحديث البيانات بنجاح';
                loaderSpinner.style.display = 'none';

            } catch (error) {
                console.error('Error fetching data:', error);
                statusText.innerHTML = `⚠️ فشل التحديث: ${error.message || 'خطأ غير معروف'}`;
                loaderSpinner.style.display = 'none';
                // 不清除已有数据，保留上次成功加载的内容
            }
        }

        // --- 启动：首次加载 & 定时刷新 ---
        fetchData();
        setInterval(fetchData, REFRESH_INTERVAL);
        console.log(`✅ تم الإعداد، سيتم التحديث كل ${REFRESH_INTERVAL / 1000} ثانية.`);
    })();
</script>
</body>
</html>
